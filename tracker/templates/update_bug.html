

{% load static %}
<link rel="stylesheet" href="{% static 'tracker/style.css' %}">

<div class="update-bug-container">
    <h1>Update Bug</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" value="{{ bug.title }}" placeholder="Bug Title" required>
        <textarea name="description" placeholder="Description" required>{{ bug.description }}</textarea>
        
        <label>Priority:</label>
        <select name="priority">
            <option value="Low" {% if bug.priority == 'Low' %}selected{% endif %}>Low</option>
            <option value="Medium" {% if bug.priority == 'Medium' %}selected{% endif %}>Medium</option>
            <option value="High" {% if bug.priority == 'High' %}selected{% endif %}>High</option>
        </select>

        <label>Status:</label>
        <select name="status">
            <option value="Open" {% if bug.status == 'Open' %}selected{% endif %}>Open</option>
            <option value="In Progress" {% if bug.status == 'In Progress' %}selected{% endif %}>In Progress</option>
            <option value="Closed" {% if bug.status == 'Closed' %}selected{% endif %}>Closed</option>
        </select>

        <label>Project:</label>
        <select name="project">
            {% for project in projects %}
                <option value="{{ project.id }}" {% if bug.project.id == project.id %}selected{% endif %}>{{ project.name }}</option>
            {% endfor %}
        </select>

        <label>Assign To:</label>
        <select name="assigned_to">
            {% for user in users %}
                <option value="{{ user.id }}" {% if bug.assigned_to.id == user.id %}selected{% endif %}>{{ user.username }}</option>
            {% endfor %}
        </select>

        <button type="submit">Update</button>
    </form>
</div>
